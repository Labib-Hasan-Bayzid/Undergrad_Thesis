<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin • Users</title>

  <link rel="stylesheet" href="css/admin_users.css" />
</head>

<body>
  <div class="bg" aria-hidden="true"></div>
  <div class="bg-overlay" aria-hidden="true"></div>

  <main class="shell">
    <!-- Topbar -->
    <header class="topbar glass">
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <svg viewBox="0 0 64 64" role="img" focusable="false">
            <defs>
              <linearGradient id="au1" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="rgba(124,92,255,0.95)"/>
                <stop offset="1" stop-color="rgba(34,211,238,0.95)"/>
              </linearGradient>
            </defs>
            <path fill="url(#au1)" d="M32 8c9.5 0 17.2 7.7 17.2 17.2S41.5 42.4 32 42.4 14.8 34.7 14.8 25.2 22.5 8 32 8z"/>
            <path fill="rgba(255,255,255,0.88)" d="M14 56c2.6-10.2 10.1-14.8 18-14.8S47.4 45.8 50 56v2H14v-2z"/>
          </svg>
        </div>

        <div class="brand-text">
          <h1>Users</h1>
          <p>Overview • Subscription status • Access control</p>
        </div>
      </div>

      <div class="top-actions">
        <a class="btn btn-ghost" href="admin_dashboard.html">Dashboard</a>
        <a class="btn btn-ghost" href="admin_sellers.html">Sellers</a>
        <a class="btn btn-ghost" href="admin_records.html#subscriptions">Records</a>
        <a class="btn btn-ghost" href="http://localhost:5000\index.html">Auto Vault</a>
        <a class="btn btn-danger" href="login.html" id="btnLogout">Logout</a>
      </div>
    </header>

    <!-- Controls -->
    <section class="controls glass">
      <div class="search">
        <span class="icon" aria-hidden="true">⌕</span>
        <input id="searchInput" type="text" placeholder="Search by user name, phone, city..." autocomplete="off"/>
        <button class="btn btn-ghost btn-mini" id="btnClearSearch" type="button">Clear</button>
      </div>

      <div class="filters">
        <div class="field">
          <label for="subFilter">Subscription</label>
          <select id="subFilter">
            <option value="all">All</option>
            <option value="active">Active</option>
            <option value="expired">Expired</option>
            <option value="none">None</option>
          </select>
        </div>

        <div class="field">
          <label for="accessFilter">Access</label>
          <select id="accessFilter">
            <option value="all">All</option>
            <option value="active">Active</option>
            <option value="blocked">Blocked</option>
          </select>
        </div>

        <div class="field">
          <label for="sortBy">Sort</label>
          <select id="sortBy">
            <option value="recent">Recent</option>
            <option value="nameAsc">Name: A → Z</option>
            <option value="nameDesc">Name: Z → A</option>
          </select>
        </div>

        <button class="btn btn-primary" id="btnApply" type="button">Apply</button>
      </div>
    </section>

    <!-- KPIs -->
    <section class="kpis">
      <article class="kpi glass">
        <p class="kpi-label">Total Users</p>
        <p class="kpi-value" id="kpiTotal">0</p>
        <p class="kpi-sub" id="kpiTotalSub">—</p>
      </article>

      <article class="kpi glass">
        <p class="kpi-label">Active Subscription</p>
        <p class="kpi-value" id="kpiActiveSub">0</p>
        <p class="kpi-sub" id="kpiActiveSubSub">—</p>
      </article>

      <article class="kpi glass">
        <p class="kpi-label">Blocked</p>
        <p class="kpi-value" id="kpiBlocked">0</p>
        <p class="kpi-sub" id="kpiBlockedSub">—</p>
      </article>
    </section>

    <!-- Users table -->
    <section class="panel glass">
      <div class="panel-head">
        <div>
          <h2>User List</h2>
          <p class="muted">Manage access and view subscription state</p>
        </div>
        <div class="panel-actions">
          <button class="btn btn-ghost btn-mini" id="btnRefresh" type="button">Refresh</button>
        </div>
      </div>

      <div class="table">
        <div class="trow thead">
          <div class="tcell">User</div>
          <div class="tcell">Phone</div>
          <div class="tcell">City</div>
          <div class="tcell">Subscription</div>
          <div class="tcell">Access</div>
          <div class="tcell">Action</div>
        </div>
        <div id="userRows"></div>
      </div>

      <div class="empty glass-soft" id="emptyState" hidden>
        <h3>No users found</h3>
        <p>Try clearing filters.</p>
        <button class="btn btn-primary" id="btnClearAll" type="button">Clear Filters</button>
      </div>
    </section>

    <!-- Toast -->
    <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>
  </main>

  <script src="js/admin_users.js" defer></script>
</body>
</html>
