<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Workshops List</title>

  <link rel="stylesheet" href="css/workshop_list.css" />
</head>

<body>
  <div class="bg" aria-hidden="true"></div>
  <div class="bg-overlay" aria-hidden="true"></div>

  <main class="shell">
    <!-- Topbar -->
    <header class="topbar glass">
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <svg viewBox="0 0 64 64" role="img" focusable="false">
            <defs>
              <linearGradient id="wl1" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="rgba(124,92,255,0.95)"/>
                <stop offset="1" stop-color="rgba(34,211,238,0.95)"/>
              </linearGradient>
            </defs>

            <!-- cleaner garage icon -->
            <rect x="10" y="20" width="44" height="26" rx="8" fill="rgba(255,255,255,0.14)"/>
            <path d="M18 36h28" stroke="rgba(255,255,255,0.8)" stroke-width="4" stroke-linecap="round"/>
            <path d="M20 26h24" stroke="url(#wl1)" stroke-width="4" stroke-linecap="round"/>
            <circle cx="22" cy="46" r="4" fill="rgba(255,255,255,0.9)"/>
            <circle cx="42" cy="46" r="4" fill="rgba(255,255,255,0.9)"/>
          </svg>
        </div>

        <div class="brand-text">
          <h1>Workshops</h1>
          <p>Select a workshop to view services</p>
        </div>
      </div>

      <div class="top-actions">
        <a class="btn btn-ghost" href="workshops.html">Back</a>
        <a class="btn btn-ghost" href="marketplace.html">Marketplace</a>
        <a class="btn btn-ghost" href="auto_vault.html">Auto Vault</a>
        <a class="btn btn-danger" href="login.html" id="btnLogout">Logout</a>
      </div>
    </header>

    <!-- Search -->
    <section class="searchbar glass">
      <div class="search">
        <span class="icon" aria-hidden="true">⌕</span>
        <input id="searchWorkshop" type="text" placeholder="Search workshop name..." autocomplete="off" />
        <button class="btn btn-ghost btn-mini" id="btnClearSearch" type="button">Clear</button>
      </div>

      <div class="meta-row">
        <p class="meta" id="resultMeta">0 workshops</p>
        <button class="btn btn-ghost btn-mini" id="btnReset" type="button">Reset</button>
      </div>
    </section>

    <!-- Grid -->
    <section class="grid-wrap">
      <div class="grid glass" id="workshopList" aria-label="Workshop list"></div>

      <div class="empty glass" id="emptyState" hidden>
        <h3>No workshops found</h3>
        <p>Try a different search.</p>
        <button class="btn btn-primary" id="btnEmptyReset" type="button">Reset</button>
      </div>
    </section>
  </main>

  <script src="js/workshop_list.js" defer></script>
</body>
</html>
